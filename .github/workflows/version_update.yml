name: Update Version Record

# workflow based on https://github.com/JH989876525/twin_repo

on:
  repository_dispatch:
    types: [version_update]

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        # with:
        #   token: ${{ secrets.MY_PAT }}

      - name: Update Files
        run: |
          # Decode and overwrite README.md
          echo "${{ github.event.client_payload.doc_readme }}" | base64 -d > README.md
          
          mkdir -p doc

          # Decode and overwrite doc/VERSION.md
          echo "${{ github.event.client_payload.doc_version }}" | base64 -d > doc/VERSION.md

          # Decode and overwrite doc/DEVELOPMENT.md
          echo "${{ github.event.client_payload.doc_development }}" | base64 -d > doc/DEVELOPMENT.md

          # Decode Release Note and store in multi-line environment variable
          echo "DECODED_NOTES<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.client_payload.doc_release_note }}" | base64 -d >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automatically update version ${{ github.event.client_payload.version }}"
            git push
          fi

      # - name: Create Public Release
